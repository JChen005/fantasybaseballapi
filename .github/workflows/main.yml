name: Player API CI

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - main

concurrency:
  group: player-api-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: 20

jobs:
  player-api:
    name: Player API tests and app check
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: player-api/package-lock.json

      - name: Install dependencies
        working-directory: player-api
        run: npm ci

      - name: Run tests
        working-directory: player-api
        run: npm test

      - name: Verify Player API app loads
        working-directory: player-api
        run: node -e "require('./src/app'); console.log('Player API app loaded successfully')"
